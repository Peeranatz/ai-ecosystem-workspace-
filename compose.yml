services:
  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

    command: >
      redis-server
      --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: labelstudio
      POSTGRES_USER: labelstudio_user
      POSTGRES_PASSWORD: labelstudio_password
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labelstudio_user -d labelstudio"]
      interval: 10s
      timeout: 5s
      retries: 5

  label-studio:
    image: heartexlabs/label-studio:1.12.0
    container_name: label-studio
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DJANGO_DB=default
      - POSTGRE_NAME=labelstudio
      - POSTGRE_USER=labelstudio_user
      - POSTGRE_PASSWORD=labelstudio_password
      - POSTGRE_PORT=5432
      - POSTGRE_HOST=postgres
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=false
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - label-studio-data:/label-studio/data

volumes:
  redis-data:
  postgresql-data:
  label-studio-data: